version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-transactions_db}
      POSTGRES_USER: ${POSTGRES_USER:-transactions_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-transactions_pass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transactions_user"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  jena-fuseki:
    image: stain/jena-fuseki:4.9.1
    environment:
      FUSEKI_DATASET_1: ${JENA_DATASET:-transactions}
    ports:
      - "${JENA_PORT:-3031}:3030"
    env_file:
      - .env
    volumes:
      - ./config/fuseki-config.ttl:/etc/fuseki/config.ttl
      - jena_data:/fuseki-base/databases
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3030/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  jena_data:
