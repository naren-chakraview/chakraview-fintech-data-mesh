# TDB2 Database Configuration for Accounts Domain

# Database location
tdb.location=/fuseki-base/databases/accounts

# Index configuration
tdb:primaryIndexTriples=SPO,POS,OSP
tdb:primaryIndexQuads=SPOG,POSG,OSPG,GSPO

# Query engine settings
arq.optimizer=true
arq.filtering=true

# Symbol table settings
tdb:symbolTableType=bPlus

# Prefixes for common ontologies
@prefix fintech: <https://chakracommerce.com/ontology/fintech/> .
@prefix rdf: <http://www.w3.org/1999/02/22-rdf-syntax-ns#> .
@prefix rdfs: <http://www.w3.org/2000/01/rdf-schema#> .
@prefix xsd: <http://www.w3.org/2001/XMLSchema#> .
