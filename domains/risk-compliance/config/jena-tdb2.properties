# TDB2 Database Configuration for Risk/Compliance Domain

# Database location
tdb.location=/fuseki-base/databases/risk_compliance

# Index configuration
tdb:primaryIndexTriples=SPO,POS,OSP
tdb:primaryIndexQuads=SPOG,POSG,OSPG,GSPO

# Query engine settings
arq.optimizer=true
arq.filtering=true

# Symbol table settings
tdb:symbolTableType=bPlus
