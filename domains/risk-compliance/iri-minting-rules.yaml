# Risk/Compliance Domain IRI Minting Rules
# Defines how to deterministically mint stable IRIs for RiskProfile and cross-domain Customer references
# Owner: Risk/Compliance domain team
# Purpose: Enable deterministic RDF entity identification for risk assessments and compliance records

entity_rules:
  risk_profile:
    # Risk Profiles are identified by risk_id, which is globally unique per risk assessment
    # No cross-domain deduplication needed
    key_fields:
      - risk_id
    normalize: "identity (risk IDs are globally unique)"
    description: |
      Risk Profiles are identified by globally unique risk_id.
      No normalization needed. Direct format ensures readability and traceability.
      Example: risk_2026_john_acme → https://chakracommerce.com/risk#risk_2026_john_acme
    iri_format: "https://chakracommerce.com/risk#{risk_id}"
    ttl_seconds: 3600

# ============================================================================
# CROSS-DOMAIN RESOLUTION: Customer IRI Linking
# ============================================================================
# Risk/Compliance domain does NOT own Customer entity (Accounts domain owns it)
# But Risk/Compliance must reference Customer IRIs for entity linking
# This section documents how to resolve Customer IRIs from risk records

cross_domain_resolution:
  customer_iri:
    source_domain: "accounts"
    source_entity: "customer"
    key_fields:
      - customer_email
      - customer_kyc_id
    normalize: "lowercase + trim + concatenate (MUST MATCH Accounts domain)"
    hash_algorithm: "SHA-256 first 8 characters (MUST MATCH Accounts domain)"
    iri_format: "https://chakracommerce.com/customer#{hash}"
    description: |
      Risk records contain customer_email and customer_kyc_id.
      Apply SAME normalization as Accounts domain:
      1. Lowercase and trim both fields
      2. Concatenate: {email}|{kyc_id}
      3. SHA-256 hash the concatenated string
      4. Take first 8 characters of hex digest
      5. Result: https://chakracommerce.com/customer#{hash}

      Critical: Must match Accounts domain IRI exactly for entity deduplication.
    note: |
      This is a LOOKUP operation, not an IRI minting operation.
      Risk/Compliance domain does NOT mint Customer IRIs.
      Risk Profiles link to Customer IRIs minted by Accounts domain.
    ttl_seconds: 3600
